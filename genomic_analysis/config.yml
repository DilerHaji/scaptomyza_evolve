freebayes: 
    #chunks: 100000
    data_size: "100e4"
    interval_size: 16384
    QUAL: 20 #removes any sites with estimated probability of not being polymorphic less than phred 20 (aka 0.01), or probability of polymorphism > 0.99.
    DP: 10 # depth filter
    slop: 5 # number of base pairs on either end of a non-SNP variant that will be removed from the final list of variants 
    BEST_N_ALLELES: 3 # When running with high --ploidy settings, it may be required to set --use-best-n-alleles to a low number to limit memory usage.
