cmh: # from https://github.com/popgenvienna/popoolation2/blob/master/cmh-test.pl
    # the minimum coverage; used for SNP identification, 
    # the coverage in ALL selected populations has to be higher or equal to this threshold, 
    # otherwise no SNP will be called. default=4
    min-coverage: 4 
    # The maximum coverage; All selected populations are required to have coverages 
    # lower or equal than the maximum coverage; Mandatory
    # The maximum coverage may be provided as one of the following:
    # '500' a maximum coverage of 500 will be used for all populations
    # '300,400,500' a maximum coverage of 300 will be used for the first population, a maximum coverage of 400 for the second population and so on
    # '2%' the 2% highest coverages will be ignored, this value is independently estimated for every population
    max-coverage: 100
    # the minimum count of the minor allele; used for SNP identification. SNPs will be identified 
    # considering all populations simultanously. default=2 
    # The minimum count may be provided as one of the following two ways:
    min-count: 2
    # The name of the corrected sync file to use 
    correction: "Czech2023"
    # Used in plotting 
    significance_threshold: 0.05

