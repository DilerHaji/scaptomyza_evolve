poolsnp: # from https://github.com/capoony/PoolSNP
# Note that this seems to remove indels based on source code 
# There is also a --base-quality-threshold and --coding (Illumina FASTQ quality coding) options. Not being used here because mpileup step does it. 
# The default --base-quality-threshold in 15 (~3% chance of error, permissive)
    #max-cov: 0.95 # MOVED TO MAP
    # Maximum coverage is calculated for every library and chromosomal arm as the percentile of a coverage distribution; 
    # e.g. max-cov=0.98 will only consider positions within the 98% coverage percentile for a given sample and chromosomal arm; 
    # This cutoff can either be newly calculated by providing the threshold percentile or by providing the full path to a max-coverage file. 
    # This needs to be tab-delimited with two columns, where the first contains the chromosome name and the second a comma-separated list of 
    # coverage-thresholds corresponding in length to the number of samples in the mpileup file. 
    # For example, if a max-cov threshold of 100 and 200 should be set for the first three and the last two samples in the mpileup file for chromosome 2L, 
    # a typical line in the max-cov file should look like this: 2L 100,100,100,200,200
    #min-cov: 20 # MOVED TO MAP
    # Minimum coverage across all libraries; e.g. min-cov=10 will only consider positions with a minimum coverage >10
    #min-count: 50 # MOVED TO MAP
    # Minimum allele count of a minor allele across all libraries combined; e.g. min-count=10 will only consider a position as polymorphic 
    # if the cumulative count of a minor allele across all samples in the input mpileup is equal or larger than the threshold
    #min-freq: 0.1 # MOVED TO MAP
    # Minimum allele frequency of a minor allele across all libraries combined; e.g. min-freq=10 will only consider a position as polymorphic 
    # if the relative frequency of a minor allele calculated from cummulative counts across all samples in the input mpileup is equal or larger than the threshold
    #miss-frac: 0 # MOVED TO MAP
    # Missing fraction, is the maximum percentage of libraries that are allowed to NOT full-fill all above criteria; e.g. if miss-frac=0.2 is set, 
    # the script will report sites even if 20% of all samples (e.g. 2 out of 10) do not fulfill the coverage criteria
    jobs: 10
    badsites: 1
    allsites: 0
    # All Sites, if all sites should be reported irrespective of whether they are polymorphic or not, you can set the parameter allsites=1. 
    # Note, that this will disable the miss-frac parameter
    bins: 50 # for the histogram output of the FREQ


snape: 
    # default 
    fold: folded
    
    # default  
    priortype: "informative"
    
    # From https://doi.org/10.1101/767160. 
    # "Nucleotide diversity (π) was calculated per scaffold for four-fold
    # degenerate sites using Popoolation Variance-sliding.pl for repeat-masked autosomal
    # scaffolds (N = 819) greater than 20 kb in length. Parameters were: a ploidy level of 90,
    # minimum allele count of two, minimum quality score of 20, minimum coverage of four,
    # and a maximum coverage of 100."
    theta: 0.0056
    
    # Used in DEST pipeline https://github.com/DEST-bio/DEST_freeze1/blob/main/snpCalling/PoolSNP/PoolSnp_README.md
    d: 0.01
    bins: 50 # for the histogram output of the 1-p(0)

