# From DEST paper https://github.com/DEST-bio/DEST_freeze1/blob/main/snpCalling/PoolSNP/PoolSnp_README.md
# python PoolSnp.py  # see DEST-bio PoolSNP: https://github.com/DEST-bio/DEST_freeze1 \
