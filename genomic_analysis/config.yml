############################################################################################################################################################################################################
#### Mimicree2 simulation
############################################################################################################################################################################################################

mimicree:
  # Window sizes (bp) used when computing null PBS from simulated data.
  # Should match the empirical window sizes used in the timeslice heatmap.
  # How many replicates to include in the null distribution.
  # Must match how many sim{rep}_B.sync and sim{rep}_T.sync exist in
  # mimicree/combined_resampled/ (currently 100).
  null_reps: 100

  null_pbs_windows:
    - 50000
    - 110000
    - 200000
    - 500000
    - 1000000
    - 2000000

  # Per-treatment selection regime.
  # Set selection_regime to null for a neutral simulation.
  # Set to the path of a Mimicree2 --sr-loci-file to inject selection.
  treatments:
    B:
      selection_regime: ~
    T:
      selection_regime: ~
    M:
      selection_regime: ~



# ==============================================================================
# FOCUSED MIMICREE PBS — candidate-region simulation pipeline
# ==============================================================================
focused_mimicree:

  # ── Region identification ──────────────────────────────────────────────────
  # Path to candidate_regions.tsv (generated by focused_select_regions rule).
  # Commit this file after running select_candidate_regions.py so the
  # simulation wildcard expansion is stable across cluster runs.
  candidate_regions: "focused_mimicree/candidate_regions.tsv"

  # Empirical analysis name whose divergence_stats.csv is used for region
  # selection and empirical PBS extraction.  Must match a key in
  # grenfst/divergence_mixture_lmm/.
  empirical_analysis: "e10Ffe9wGREN_btwTB_200000_1000"
  # LMM output directory — set to _old while re-run is in progress.
  # Update to "grenfst/divergence_mixture_lmm" once new run completes.
  empirical_lmm_dir: "grenfst/divergence_mixture_lmm_old"

  # ── Region selection parameters ───────────────────────────────────────────
  # Top-N seed windows ranked by (z_pbsn1 + z_pbsn1_ref) / 2
  top_n: 10

  # Stop extending a region once the per-window combined z-score drops below
  # (1 - drop_fraction) * seed_max.  0.5 = stop at 50% of seed maximum.
  drop_fraction: 0.5

  # ── Simulation parameters ─────────────────────────────────────────────────
  # Number of neutral simulation replicates per candidate region.
  # Each rep runs 4 T + 4 B + 4 M MimicrEE2 sims to reproduce the empirical
  # 4-replicate-per-treatment design, yielding 64 T×B×M trios per rep for
  # LMM fitting on the null. 2500 reps → min p-value 4e-4 (ample for the
  # 6-region Bonferroni threshold of 8.3e-3). Compute equivalent to the
  # earlier 10k × 3-sim plan.
  n_reps: 2500

  # Number of MimicrEE2 replicate lineages per treatment (matches empirical
  # design: 4 T, 4 B, 4 M). Changing this requires coordinated updates to
  # rename/comps rules and the LMM fitting.
  n_lineages_per_trt: 4

  # Genomic window size (bp) for grenedalf FST in simulations.
  # Should match the empirical_analysis window size above.
  # Change both together if switching from 200 kb.
  window_size: 200000

  # Histogram bins for null distribution plots
  histogram_bins: 80


