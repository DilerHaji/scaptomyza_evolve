    extra: "-r -c -p"


pileup_map: "maps/pileup.txt"
# Generating a pileup file 
mpileup:
# TBD: Need to consider putting in -B and -C
# -B Base Alignment Quality - important around indels
# -C sets the coefficient for downgrading mapping quality for reads with excessive mismatches
    min_map_quality: 25     # q Minimum mapping quality for an alignment to be used [0]
    min_quality: 25         # Q Minimum base quality for a base to be considered. [13]
#    rg_tag: "-B -C 50 --ignore-RG"   # Ignore RG tags. Treat all reads in one BAM as one sample.
    rg_tag: "-B --ignore-RG"   # Ignore RG tags. Treat all reads in one BAM as one sample.

# Generating a sync file 
sync: 
    min_qual: 20
    threads: 1

# Subsampling the sync file to even coverage. Uses subsample-synchronized.pl from popoolation
subsample: 
    method: "fraction" # withreplace, withoutreplace, fraction
    target_coverage: 20
    max_coverage: 50

pfilter:
    freq_column: "1.FREQ"
    freq_cutoff_lower: 0.01 # The minimum uncorrected allele frequency for a variant within a treatment+population+generation to be considered in downstream analysis 
    freq_cutoff_upper: 0.99 # The maximum uncorrected allele frequency for a variant within a treatment+population+generation to be considered in downstream analysis 
    min_occurance_gen: 50 # percent of generation in which the allele is present above the frequency cutoff
    min_occurance_pop: 50 # The number of populations in which the variant exists

