##############################################################################
# Haplovalidate pipeline configuration
#
# Standalone config for Snakefile_haplovalidate.
# Takes merged_ad.tsv / merged_depth.tsv as pre-existing inputs.
##############################################################################

# Input data (already produced by the main pipeline)
merged_ad: "variance_analysis/merged_ad.tsv"
merged_depth: "variance_analysis/merged_depth.tsv"
sample_list: "variance_analysis/sample_list.txt"

# Scaffolds to analyze (top 4 by size; excludes small contigs that crash haplovalidate)
scaffolds:
  - "chr_ScDA7r2_597_HRSCAF_953"
  - "chr_ScDA7r2_110_HRSCAF_295"
  - "chr_ScDA7r2_439_HRSCAF_779"
  - "chr_ScDA7r2_126_HRSCAF_325"
  # Tried adding 5 more small scaffolds — they have <100 candidates each
  # after ACER filtering, causing haplovalidate to crash (empty clusters).
  # Reverted to top 4 for stability.

# Generations available across all replicates (intersection)
generations: [0, 1, 2, 6, 7, 8, 9]

##############################################################################
# Treatment definitions
#
# Each treatment produces one sync file. The pipeline expands
# {treatment} × {paramset} for ACER + haplovalidate.
#
# type: "single" (4 reps, 1 treatment letter) or "pairwise" (8 reps, 2 letters)
##############################################################################
treatments:
  B:
    type: single
    n_repl: 4
  T:
    type: single
    n_repl: 4
  M:
    type: single
    n_repl: 4
  BT:
    type: pairwise
    n_repl: 8
  BM:
    type: pairwise
    n_repl: 8
  TM:
    type: pairwise
    n_repl: 8

##############################################################################
# Parameter sets for sweep
#
# Each named set defines ALL tunable parameters. The pipeline runs every
# {treatment} × {paramset} combination.
#
# ACER parameters:
#   Ne         - population effective size (drift variance)
#   poolSize   - haploid pool-seq sample size (pool-seq noise)
#   maf_min    - minimum founder MAF to include a site
#   min_depth  - minimum depth across all treatment samples
#
# Haplovalidate parameters:
#   max_cands_per_scaffold - cap on ACER candidates per scaffold
#   mncs       - MNCS threshold for window size selection (0.01 = 1%)
#   takerandom - number of SNPs sampled for cluster comparisons
#   filterrange - range in bp for dominant-block merging
#   score_threshold - -log10(p) threshold for ACER candidate selection
##############################################################################
paramsets:
  # Primary analysis: nominal pool size, following Spitzer et al. convention
  A_nominal:
    Ne: 250
    poolSize: 160
    maf_min: 0.05
    min_depth: 20
    max_cands_per_scaffold: 15000
    mncs: 0.01
    takerandom: 2000
    filterrange: 5000
    score_threshold: 1.3

  # Sensitivity: effective pool size from founder-validated overdispersion
  B_effective:
    Ne: 250
    poolSize: 58
    maf_min: 0.05
    min_depth: 20
    max_cands_per_scaffold: 15000
    mncs: 0.01
    takerandom: 2000
    filterrange: 5000
    score_threshold: 1.3

  # BH-filtered: only BH-significant candidates (strictest, sharpest blocks)
  C_bh_filtered:
    Ne: 250
    poolSize: 160
    maf_min: 0.05
    min_depth: 20
    max_cands_per_scaffold: 15000
    mncs: 0.01
    takerandom: 2000
    filterrange: 5000
    score_threshold: 1.3
    use_bh: true

  # # Uncomment to add more sweeps:
  # strict_maf:
  #   Ne: 250
  #   poolSize: 160
  #   maf_min: 0.10
  #   min_depth: 20
  #   max_cands_per_scaffold: 50000
  #   mncs: 0.01
  #   takerandom: 2000
  #   filterrange: 5000
  #   score_threshold: 1.3
  #
  # mncs_3pct:
  #   Ne: 250
  #   poolSize: 160
  #   maf_min: 0.05
  #   min_depth: 20
  #   max_cands_per_scaffold: 50000
  #   mncs: 0.03
  #   takerandom: 2000
  #   filterrange: 5000
  #   score_threshold: 1.3
  #
  # ne_scan_200:
  #   Ne: 200
  #   poolSize: 160
  #   maf_min: 0.05
  #   min_depth: 20
  #   max_cands_per_scaffold: 50000
  #   mncs: 0.01
  #   takerandom: 2000
  #   filterrange: 5000
  #   score_threshold: 1.3

##############################################################################
# Conda environment + local R package sources
##############################################################################
conda_env: "environments/haplovalidate.yaml"

# Local source directories for non-CRAN R packages (installed automatically)
acer_source: "ACER-master"
haplovalidate_source: "haplovalidate-master"
# haploReconstruct: if a local directory exists it will be used; otherwise
# installed from GitHub (popgenvienna/haploReconstruct)
haploreconstruct_source: "haploReconstruct-master"

##############################################################################
# Cluster resources
##############################################################################
cluster:
  account: "${SLURM_ACCOUNT}"
  partition: "savio4_htc"
  time: "04:00:00"
  mem: "32G"
